version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fintech-postgres
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech123
      POSTGRES_DB: fintech_chicago
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fintech-redis
    ports:
      - "6379:6379"

  mlflow:
    image: python:3.11-slim
    container_name: fintech-mlflow
    ports:
      - "5001:5000"
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"

volumes:
  postgres_data:
